services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipgate
      POSTGRES_PASSWORD: shipgate
      POSTGRES_DB: shipgate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipgate -d shipgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Playwright + OpenAI agent: polls Analysis API for jobs, drives browser via MCP-shaped tools, posts findings.
  # Requires OPENAI_API_KEY. Point SHIPGATE_API_URL at the host API (or add api service to this compose).
  playwright-agent:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.playwright-agent
    environment:
      SHIPGATE_API_URL: http://host.docker.internal:4000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-gpt-4o-mini}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "1gb"

  # Jenkins LTS - create a Pipeline job named "shipgate-regression" (see Jenkinsfile).
  # UI: http://localhost:8080 - first run: docker compose logs jenkins (initial admin password).
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    # Lets Jenkins reach services on your machine (API :4000)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:
  jenkins_home:
