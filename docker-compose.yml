services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipgate
      POSTGRES_PASSWORD: shipgate
      POSTGRES_DB: shipgate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipgate -d shipgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mortgage-app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mortgage-app
    ports:
      - "3099:3099"
    environment:
      - NODE_ENV=production

  # Jenkins LTS - create a Pipeline job named "shipgate-regression" (see Jenkinsfile).
  # UI: http://localhost:8080 - first run: docker compose logs jenkins (initial admin password).
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    # Lets Jenkins reach services on your machine (API :4000, mortgage :3099)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:
  jenkins_home:
